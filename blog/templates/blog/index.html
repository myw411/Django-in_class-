<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Blog</title>
</head>

<body>
    <h1>Blog</h1>
    
# 데이터 베이스와 템플릿 연동하는 부분
{% for p in posts %}
    <hr/>
    <!-- <a>사이에 있는게 제목을 클릭하면 상세 페이지로 이동 가능하게 함 -->
    <h2><a href="{{ p.get_absolute_url }}">{{ p.title }}</a></h2>
    <h4>{{ p.created }}</h4>
    <p>{{ p.content }}</p>
{% endfor %}
</body>
</html>
